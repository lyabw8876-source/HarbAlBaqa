<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>حرب البقاء | مجموعة دراية</title>
<style>
@font-face{font-family:'Thmanyah';src:url('fonts/thmanyahserifdisplay-Light.otf') format('opentype');font-weight:300;font-display:swap}
@font-face{font-family:'Thmanyah';src:url('fonts/thmanyahserifdisplay-Regular.otf') format('opentype');font-weight:400;font-display:swap}
@font-face{font-family:'Thmanyah';src:url('fonts/thmanyahserifdisplay-Medium.otf') format('opentype');font-weight:500;font-display:swap}
@font-face{font-family:'Thmanyah';src:url('fonts/thmanyahserifdisplay-Bold.otf') format('opentype');font-weight:700;font-display:swap}
@font-face{font-family:'Thmanyah';src:url('fonts/thmanyahserifdisplay-Black.otf') format('opentype');font-weight:900;font-display:swap}

*{box-sizing:border-box}
:root{
  --bg1:#050712;--bg2:#101827;--text:#fff;--gold:#d4af37;
  --glass:rgba(255,255,255,.08);--border:rgba(255,255,255,.16);
  --t0:#2563EB;--t1:#F97316;--t2:#10B981;--t3:#8B5CF6;
}
body.light{--bg1:#f8fafc;--bg2:#e5e7eb;--text:#111827;--glass:rgba(0,0,0,.05);--border:rgba(0,0,0,.12)}
body{
  margin:0;min-height:100vh;font-family:'Thmanyah',sans-serif;color:var(--text);text-align:center;overflow-x:hidden;
  background:
    radial-gradient(circle at top,rgba(212,175,55,.25),transparent 28%),
    radial-gradient(circle at left,var(--t0),transparent 32%),
    radial-gradient(circle at right,var(--t1),transparent 32%),
    linear-gradient(135deg,var(--bg1),var(--bg2) 55%,var(--bg1));
}
.page{max-width:1320px;margin:auto;padding:16px}
.main-logo{width:145px;display:block;margin:0 auto 4px;filter:drop-shadow(0 0 28px rgba(212,175,55,.38))}
.title{font-size:38px;font-weight:900;color:#fde68a;margin:2px 0 8px}
.scoreboard{display:grid;grid-template-columns:repeat(var(--teamCount,2),1fr);gap:10px;margin:8px auto 12px;max-width:1120px}
.team-card{
  background:var(--glass);border:1px solid var(--border);border-radius:22px;padding:10px 12px;
  box-shadow:0 14px 36px rgba(0,0,0,.24);position:relative;overflow:hidden
}
.team-card::before{content:'';position:absolute;inset:0 0 auto 0;height:5px;background:var(--teamColor)}
.team-name{font-size:20px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.team-score{font-size:40px;font-weight:900;color:#fde68a;line-height:1}
.team-badges{font-size:20px;min-height:24px;margin-top:2px}
.center-status{
  max-width:780px;margin:6px auto 10px;padding:10px 16px;border-radius:20px;
  background:rgba(212,175,55,.12);border:1px solid rgba(212,175,55,.28);color:#fde68a;font-weight:900
}
.board-wrap{position:relative;margin:10px auto 0;max-width:980px}
.board-glow{position:absolute;inset:0;margin:auto;width:90%;height:78%;border-radius:50%;
  background:radial-gradient(circle at center,rgba(212,175,55,.16),transparent 55%),radial-gradient(circle at left,var(--t0),transparent 35%),radial-gradient(circle at right,var(--t1),transparent 35%);
  filter:blur(38px);opacity:.34;z-index:0}
.board{position:relative;z-index:1;display:grid;grid-template-columns:repeat(var(--cols,5),1fr);gap:12px}
.tile{
  height:86px;border:1px solid rgba(255,255,255,.18);
  background:radial-gradient(circle at top,rgba(253,230,138,.16),transparent 42%),linear-gradient(145deg,rgba(255,255,255,.13),rgba(255,255,255,.05));
  border-radius:23px;color:var(--text);font-family:'Thmanyah';font-size:33px;font-weight:900;cursor:pointer;transition:.22s;
  box-shadow:0 14px 35px rgba(0,0,0,.24);position:relative;overflow:hidden
}
.tile:hover{transform:translateY(-4px) scale(1.01);border-color:#fde68a;box-shadow:0 0 28px rgba(253,230,138,.23),0 14px 35px rgba(0,0,0,.24)}
.tile.used{opacity:.25;cursor:not-allowed;filter:grayscale(1);transform:none}
.tile.used::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:38px;color:#fde68a}
.toolbar{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin:16px auto 0}
.btn{
  font-family:'Thmanyah';border:1px solid var(--border);background:var(--glass);color:var(--text);
  padding:10px 20px;border-radius:16px;font-size:16px;font-weight:800;cursor:pointer;transition:.2s
}
.btn:hover{transform:translateY(-2px);background:rgba(255,255,255,.14)}
.btn.primary{background:linear-gradient(135deg,#d4af37,#b8860b);color:#111827;border-color:rgba(253,230,138,.6)}
.btn.danger{background:rgba(220,38,38,.18);border-color:rgba(220,38,38,.45)}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.80);display:none;align-items:center;justify-content:center;z-index:100;padding:14px}
.modal.show{display:flex}
.modal-box{
  width:92%;max-width:820px;max-height:90svh;overflow:auto;border-radius:34px;padding:32px;
  background:radial-gradient(circle at top,rgba(212,175,55,.24),transparent 35%),linear-gradient(145deg,#111827,#020617);
  border:1px solid rgba(212,175,55,.45);box-shadow:0 0 85px rgba(212,175,55,.35);color:white;position:relative
}
.modal-box h2{margin:0 0 16px;color:#fde68a;font-size:36px;font-weight:900}
.setup-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;text-align:right}
.setup-row{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:20px;padding:14px}
.setup-row.full{grid-column:1/-1}
.setup-row label{display:block;margin-bottom:9px;color:#fde68a;font-weight:900;font-size:18px}
.setup-row input,.setup-row select{
  width:100%;font-family:'Thmanyah';border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.1);
  color:white;border-radius:13px;padding:11px;outline:none;font-size:17px
}
.team-settings{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.team-setting{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:12px}
.palette{display:flex;gap:9px;flex-wrap:wrap;margin-top:10px}
.color-choice{width:38px;height:38px;border-radius:50%;border:3px solid rgba(255,255,255,.35);cursor:pointer;transition:.2s}
.color-choice:hover{transform:scale(1.1)}.color-choice.active{border-color:#fde68a;box-shadow:0 0 18px #fde68a}.color-choice.disabled{opacity:.25;pointer-events:none}
.close-x{position:absolute;top:18px;left:22px;background:transparent;border:0;color:white;font-size:36px;cursor:pointer}
.reveal-icon{font-size:84px;line-height:1;margin-bottom:10px;filter:drop-shadow(0 0 26px rgba(212,175,55,.55))}
.reveal-title{font-size:38px;font-weight:900;color:#fde68a;margin:8px 0}
.reveal-text{font-size:29px;line-height:1.65;margin:12px 0}
.answer-box{display:none;margin:16px auto;padding:15px;border-radius:18px;background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.35);font-size:25px;color:#bbf7d0}
.answer-box.show{display:block}
.award-row{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:20px}.award-row.hidden{display:none}
.points-pop{position:fixed;z-index:160;font-size:52px;font-weight:900;animation:pop 1.2s ease-out forwards;pointer-events:none;text-shadow:0 0 18px rgba(212,175,55,.7)}
@keyframes pop{0%{transform:scale(.5);opacity:0}20%{transform:scale(1.15);opacity:1}100%{transform:translateY(-85px) scale(1);opacity:0}}
.confetti{position:fixed;top:-12px;width:10px;height:16px;border-radius:3px;z-index:150;pointer-events:none;animation:fall 2.8s linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
.boom{animation:boomShake .45s ease-in-out 2}@keyframes boomShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(10px)}60%{transform:translateX(-7px)}80%{transform:translateX(7px)}}
.fire{position:fixed;bottom:-30px;z-index:155;pointer-events:none;font-size:32px;animation:fireRise 2.1s ease-out forwards}
@keyframes fireRise{0%{transform:translateY(0) scale(.8);opacity:0}15%{opacity:1}100%{transform:translateY(-70vh) scale(1.55) rotate(22deg);opacity:0}}
.rank-list{display:grid;gap:12px;margin-top:18px}.rank-item{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-radius:18px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);font-size:23px;font-weight:900}
.host-cover{padding:16px;border-radius:22px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);margin-top:12px}
body.presentation .toolbar,body.presentation .title{display:none}body.presentation .main-logo{width:130px;margin-top:6px}.presentation-exit{display:none;position:fixed;bottom:18px;left:18px;z-index:80}body.presentation .presentation-exit{display:block}
@media(max-width:850px){
  .page{padding:11px}.main-logo{width:118px}.title{font-size:29px}.scoreboard{grid-template-columns:1fr 1fr!important;gap:8px}.team-name{font-size:17px}.team-score{font-size:31px}.board{gap:8px}.tile{height:66px;font-size:23px;border-radius:17px}.setup-grid,.team-settings{grid-template-columns:1fr}.modal-box{padding:22px;border-radius:25px}.modal-box h2{font-size:29px}.reveal-icon{font-size:66px}.reveal-title{font-size:30px}.reveal-text{font-size:23px}
}
</style>
</head>
<body>
<div class="page">
  <img src="images/daraya-logo.png" class="main-logo" alt="مجموعة دراية">
  <div class="title">💣 حرب البقاء</div>
  <div class="scoreboard" id="scoreboard"></div>
  <div class="center-status" id="centerStatus">اختر خانة وافتح المفاجأة</div>
  <div class="board-wrap"><div class="board-glow"></div><div class="board" id="board"></div></div>
  <div class="toolbar">
    <button class="btn" onclick="toggleTheme()">ليلي / نهاري</button>
    <button class="btn" onclick="toggleFullscreen()">شاشة كاملة</button>
    <button class="btn" onclick="togglePresentation()">وضع العرض</button>
    <button class="btn" onclick="openSetup()">الإعدادات</button>
    <button class="btn danger" id="resetBtn" onclick="confirmReset()">إعادة اللعبة</button>
  </div>
  <button class="btn presentation-exit" onclick="togglePresentation()">خروج العرض</button>
</div>

<div class="modal show" id="setupModal">
  <div class="modal-box">
    <h2>إعداد اللعبة</h2>
    <div class="setup-grid">
      <div class="setup-row">
        <label>عدد الفرق</label>
        <select id="teamCount" onchange="renderTeamInputs()">
          <option value="2">فريقين</option>
          <option value="3">3 فرق</option>
          <option value="4">4 فرق</option>
        </select>
      </div>
      <div class="setup-row">
        <label>عدد الخانات</label>
        <select id="boardSize">
          <option value="25">25 خانة</option>
          <option value="36">36 خانة</option>
          <option value="49">49 خانة</option>
        </select>
      </div>
      <div class="setup-row">
        <label>عدد القنابل</label>
        <select id="bombCount">
          <option value="2">2 قنابل</option>
          <option value="3" selected>3 قنابل</option>
          <option value="4">4 قنابل</option>
          <option value="5">5 قنابل</option>
        </select>
      </div>
      <div class="setup-row">
        <label>عقوبة القنبلة</label>
        <select id="bombMode">
          <option value="minus20">-20 نقطة</option>
          <option value="minus50">-50 نقطة</option>
          <option value="half">نصف النقاط</option>
          <option value="zero">تصفير النقاط</option>
        </select>
      </div>
      <div class="setup-row full">
        <label>الفرق والألوان</label>
        <div class="team-settings" id="teamSettings"></div>
      </div>
    </div>
    <br>
    <button class="btn primary" onclick="startGame()">بدء اللعبة</button>
  </div>
</div>

<div class="modal" id="hostModal">
  <div class="modal-box">
    <button class="close-x" onclick="closeHost()">×</button>
    <h2>🎙️ وضع المذيع</h2>
    <div class="host-cover">
      <div class="reveal-text" id="hostText">تم اختيار خانة</div>
      <button class="btn primary" onclick="revealToPlayers()">عرض للجميع</button>
    </div>
  </div>
</div>

<div class="modal" id="revealModal">
  <div class="modal-box">
    <button class="close-x" onclick="closeReveal()">×</button>
    <div class="reveal-icon" id="revealIcon">🎁</div>
    <div class="reveal-title" id="revealTitle"></div>
    <div class="reveal-text" id="revealText"></div>
    <button class="btn" id="answerBtn" onclick="showAnswer()">إظهار الإجابة</button>
    <div class="answer-box" id="answerBox"></div>
    <div class="award-row" id="awardRow"></div>
  </div>
</div>

<div class="modal" id="winnerModal">
  <div class="modal-box">
    <div class="reveal-icon">🏆</div>
    <h2>انتهت اللعبة</h2>
    <div class="rank-list" id="rankList"></div>
    <br>
    <button class="btn primary" onclick="resetGame()">لعبة جديدة</button>
  </div>
</div>

<script src="questions.js"></script>
<script>
const colorOptions=[
  {name:'أزرق ملكي',value:'#2563EB'},{name:'برتقالي',value:'#F97316'},{name:'أخضر زمردي',value:'#10B981'},
  {name:'بنفسجي',value:'#8B5CF6'},{name:'أحمر قرمزي',value:'#DC2626'},{name:'ذهبي',value:'#D4AF37'}
];

const FALLBACK_RIDDLES=[
  {
    q:'توفي رجل وترك 17 جملاً لثلاثة أبناء. أوصى أن يأخذ الابن الأكبر نصف الجمال، والأوسط ثلثها، والأصغر تسعها. كيف تنفذ الوصية دون ذبح أي جمل؟',
    a:'إضافة جمل واحد مؤقتاً ليصبح العدد 18.',
    e:'نصف 18 = 9، وثلث 18 = 6، وتسع 18 = 2. المجموع 17، ويبقى الجمل المضاف.',
    p:70
  },
  {
    q:'كتاب وقلم ثمنهما 110 ريالات. الكتاب أغلى من القلم بـ100 ريال. كم ثمن القلم؟',
    a:'5 ريالات.',
    e:'إذا كان القلم 5 ريالات، فالكتاب 105 ريالات، والمجموع 110.',
    p:90
  },
  {
    q:'لديك 9 كرات متشابهة، واحدة فقط أثقل من البقية. ومعك ميزان كفتين. ما أقل عدد وزنات لمعرفة الكرة الأثقل؟',
    a:'وزنتان.',
    e:'قسّم الكرات إلى 3 و3 و3. زن 3 مقابل 3، ثم خذ المجموعة الأثقل أو المجموعة المتبقية، وبعدها زن 1 مقابل 1.',
    p:100
  }
];

const riddles = (typeof QUESTIONS !== 'undefined' && Array.isArray(QUESTIONS) && QUESTIONS.length)
  ? QUESTIONS.map(q => ({
      q: q.question || q.q,
      a: q.answer || q.a,
      e: q.explanation || q.e || '',
      p: q.points || q.p || 50
    }))
  : FALLBACK_RIDDLES;

let teams=[{name:'الفريق الأول',color:'#2563EB',score:0,shield:0},{name:'الفريق الثاني',color:'#F97316',score:0,shield:0}];
let current=null, gameStarted=false, resetArmed=false, boardItems=[];

init();

function init(){renderTeamInputs();renderScoreboard();makeBoard()}

function renderTeamInputs(){
  const count=Number(document.getElementById('teamCount').value);
  const old=[...teams];
  teams=[];
  for(let i=0;i<count;i++)teams.push(old[i]||{name:`الفريق ${i+1}`,color:colorOptions[i].value,score:0,shield:0});
  const holder=document.getElementById('teamSettings');holder.innerHTML='';
  teams.forEach((team,i)=>{
    const box=document.createElement('div');box.className='team-setting';
    box.innerHTML=`<label>الفريق ${i+1}</label><input id="teamName${i}" value="${team.name}"><div class="palette" id="palette${i}"></div>`;
    holder.appendChild(box);renderPalette(i);
  });
}

function renderPalette(index){
  const pal=document.getElementById('palette'+index);pal.innerHTML='';
  const used=teams.map(t=>t.color);
  colorOptions.forEach(c=>{
    const b=document.createElement('button');b.className='color-choice';b.style.background=c.value;
    if(teams[index].color===c.value)b.classList.add('active');
    if(used.includes(c.value)&&teams[index].color!==c.value)b.classList.add('disabled');
    b.onclick=()=>{
      teams.forEach((team,idx)=>{
        const input=document.getElementById('teamName'+idx);
        if(input) team.name=input.value || team.name;
      });
      teams[index].color=c.value;
      renderTeamInputs();
      renderScoreboard();
    };
    pal.appendChild(b);
  });
}

function startGame(){
  teams.forEach((t,i)=>{t.name=document.getElementById('teamName'+i).value||`الفريق ${i+1}`;t.score=0;t.shield=0});
  document.getElementById('setupModal').classList.remove('show');gameStarted=true;renderScoreboard();makeBoard();
}

function openSetup(){document.getElementById('setupModal').classList.add('show')}

function renderScoreboard(){
  const sb=document.getElementById('scoreboard');sb.style.setProperty('--teamCount',teams.length);sb.innerHTML='';
  teams.forEach((t,i)=>{
    document.documentElement.style.setProperty('--t'+i,t.color);
    const card=document.createElement('div');card.className='team-card';card.style.setProperty('--teamColor',t.color);
    card.innerHTML=`<div class="team-name">${t.name}</div>
<div class="team-score">${t.score}</div>
<div style="display:flex;justify-content:center;gap:6px;margin-top:6px">
<button class="btn" style="padding:4px 10px" onclick="manualScore(${i},10)">+10</button>
<button class="btn" style="padding:4px 10px" onclick="manualScore(${i},-10)">-10</button>
</div>
<div class="team-badges">${t.shield>0?'🛡️':''}</div>`;
    sb.appendChild(card);
  });
}

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function makeBoard(){
  const size=Number(document.getElementById('boardSize')?.value||25), cols=Math.sqrt(size);
  document.getElementById('board').style.setProperty('--cols',cols);
  const bombCount=Number(document.getElementById('bombCount')?.value||3);
  const special=[...Array(bombCount).fill(null).map(()=>({type:'bomb'})),{type:'nuclear'},
    {type:'treasure',points:30},{type:'treasure',points:50},{type:'treasure',points:70},
    {type:'steal',points:30},{type:'steal',points:50},{type:'royal'},{type:'double'},{type:'shield'},{type:'devil'}];
  const questionCount=Math.max(0,size-special.length);
  const questions=shuffle(riddles).slice(0,questionCount).map(q=>({type:'question',...q}));
  boardItems=shuffle([...special,...questions]).slice(0,size);
  const board=document.getElementById('board');board.innerHTML='';
  boardItems.forEach((item,index)=>{const btn=document.createElement('button');btn.className='tile';btn.textContent=index+1;btn.onclick=()=>openHost(item,btn,index);board.appendChild(btn)});
}

function openHost(item,btn,index){
  if(!gameStarted){alert('اضغط بدء اللعبة أولاً');return}
  if(btn.classList.contains('used'))return;
  current={item,btn,index};
  document.getElementById('hostText').textContent=`تم اختيار الخانة رقم ${index+1}`;
  document.getElementById('hostModal').classList.add('show');
}
function closeHost(){document.getElementById('hostModal').classList.remove('show')}
function revealToPlayers(){closeHost();openTile(current.item,current.btn)}

function openTile(item,btn){
  document.getElementById('revealModal').classList.add('show');
  document.getElementById('answerBox').classList.remove('show');
  document.getElementById('answerBtn').style.display='none';
  document.getElementById('awardRow').classList.remove('hidden');
  document.getElementById('awardRow').innerHTML='';
  ({question:()=>showQuestion(item),bomb:showBomb,nuclear:showNuclear,treasure:()=>showTreasure(item),steal:()=>showSteal(item),royal:showRoyal,double:showDouble,shield:showShield,devil:showDevil}[item.type])();
}

function teamButtons(fn,extra=''){return teams.map((t,i)=>`<button class="btn" onclick="${fn}(${i})">${t.name}</button>`).join('')+extra}
function setReveal(icon,title,text){document.getElementById('revealIcon').textContent=icon;document.getElementById('revealTitle').textContent=title;document.getElementById('revealText').textContent=text}

function showQuestion(item){
  setReveal('🧠',`لغز بـ ${item.p} نقطة`,item.q);
  const explanation = item.e ? `<div style="margin-top:10px;font-size:20px;line-height:1.6;color:#fde68a">الشرح: ${item.e}</div>` : '';
  document.getElementById('answerBox').innerHTML = `<strong>الإجابة:</strong> ${item.a}${explanation}`;
  document.getElementById('answerBtn').style.display='inline-block';
  document.getElementById('awardRow').classList.add('hidden');
  document.getElementById('awardRow').innerHTML=teamButtons('awardQuestion',`<button class="btn" onclick="finishTile()">لا أحد</button>`);
}
function showAnswer(){document.getElementById('answerBox').classList.add('show');document.getElementById('answerBtn').style.display='none';document.getElementById('awardRow').classList.remove('hidden')}
function awardQuestion(i){addScore(i,current.item.p);finishTile()}

function showBomb(){document.body.classList.add('boom');setTimeout(()=>document.body.classList.remove('boom'),950);launchFire(44);setReveal('💣','انفجرت القنبلة!','اختر الفريق الذي ستطبق عليه العقوبة');document.getElementById('awardRow').innerHTML=teamButtons('applyBomb',`<button class="btn" onclick="finishTile()">إلغاء</button>`)}
function applyBomb(i){
  if(teams[i].shield>0){teams[i].shield--;showPoints('🛡️ حماية',teams[i].color);renderScoreboard();finishTile();return}
  const mode=document.getElementById('bombMode').value;
  if(mode==='minus20')teams[i].score=Math.max(0,teams[i].score-20);
  if(mode==='minus50')teams[i].score=Math.max(0,teams[i].score-50);
  if(mode==='half')teams[i].score=Math.floor(teams[i].score/2);
  if(mode==='zero')teams[i].score=0;
  showPoints('💣',teams[i].color);renderScoreboard();finishTile();
}
function showNuclear(){document.body.classList.add('boom');setTimeout(()=>document.body.classList.remove('boom'),950);launchFire(70);setReveal('☢️','القنبلة النووية!','كل الفرق تخسر 50% من نقاطها');document.getElementById('awardRow').innerHTML=`<button class="btn danger" onclick="applyNuclear()">تنفيذ</button><button class="btn" onclick="finishTile()">إلغاء</button>`}
function applyNuclear(){teams.forEach(t=>t.score=Math.floor(t.score*.5));renderScoreboard();finishTile()}

function showTreasure(item){setReveal('💰','كنز!',`+${item.points} نقطة`);document.getElementById('awardRow').innerHTML=teamButtons('awardTreasure',`<button class="btn" onclick="finishTile()">لا أحد</button>`)}
function awardTreasure(i){addScore(i,current.item.points);finishTile()}

function showSteal(item){setReveal('🏴‍☠️','سرقة نقاط',`اسرق ${item.points} نقطة`);document.getElementById('awardRow').innerHTML=teamButtons('chooseStealer',`<button class="btn" onclick="finishTile()">لا أحد</button>`)}
function chooseStealer(i){setReveal('🏴‍☠️','من الفريق المسروق؟',`${teams[i].name} سيسرق ${current.item.points} نقطة`);document.getElementById('awardRow').innerHTML=teams.map((t,j)=>j!==i?`<button class="btn danger" onclick="stealPoints(${i},${j})">${t.name}</button>`:'').join('')+`<button class="btn" onclick="finishTile()">إلغاء</button>`}
function stealPoints(from,to){const amount=Math.min(teams[to].score,current.item.points);teams[to].score-=amount;teams[from].score+=amount;showPoints('+'+amount,teams[from].color);renderScoreboard();finishTile()}

function showRoyal(){
  const opts=['plus100','plus70','double','steal50','shield'];current.royal=opts[Math.floor(Math.random()*opts.length)];
  const text={plus100:'+100 نقطة',plus70:'+70 نقطة',double:'مضاعفة نقاط الفريق',steal50:'سرقة 50 نقطة',shield:'درع حماية'}[current.royal];
  setReveal('👑','الصندوق الملكي',text);document.getElementById('awardRow').innerHTML=teamButtons('applyRoyal',`<button class="btn" onclick="finishTile()">لا أحد</button>`);
}
function applyRoyal(i){
  if(current.royal==='plus100')addScore(i,100);
  if(current.royal==='plus70')addScore(i,70);
  if(current.royal==='double'){teams[i].score*=2;showPoints('×2',teams[i].color);renderScoreboard()}
  if(current.royal==='shield'){teams[i].shield++;showPoints('🛡️',teams[i].color);renderScoreboard()}
  if(current.royal==='steal50'){current.item={points:50};chooseStealer(i);return}
  finishTile();
}
function showDouble(){setReveal('🔥','مضاعفة!','ضاعف نقاط الفريق المختار');document.getElementById('awardRow').innerHTML=teamButtons('applyDouble',`<button class="btn" onclick="finishTile()">لا أحد</button>`)}
function applyDouble(i){teams[i].score*=2;showPoints('×2',teams[i].color);renderScoreboard();finishTile()}
function showShield(){setReveal('🛡️','درع حماية','يحمي الفريق من قنبلة مرة واحدة');document.getElementById('awardRow').innerHTML=teamButtons('awardShield',`<button class="btn" onclick="finishTile()">لا أحد</button>`)}
function awardShield(i){teams[i].shield++;showPoints('🛡️',teams[i].color);renderScoreboard();finishTile()}
function showDevil(){setReveal('🎁','صندوق الشيطنة','اختر فريقاً: +50 مضمون أو مخاطرة قد تمنح +100/+200/+300 أو تصفر نقاطه');document.getElementById('awardRow').innerHTML=teamButtons('chooseDevilTeam',`<button class="btn" onclick="finishTile()">لا أحد</button>`)}
function chooseDevilTeam(i){setReveal('😈','صندوق الشيطنة',`${teams[i].name}: اختر القرار`);document.getElementById('awardRow').innerHTML=`<button class="btn" onclick="addScore(${i},50);finishTile()">+50 مضمون</button><button class="btn danger" onclick="devilRisk(${i})">المخاطرة</button>`}
function devilRisk(i){const outcomes=[300,200,100,-999];const result=outcomes[Math.floor(Math.random()*outcomes.length)];if(result===-999){teams[i].score=0;showPoints('💣 صفر',teams[i].color)}else addScore(i,result);renderScoreboard();finishTile()}

function addScore(i,pts){teams[i].score+=pts;showPoints('+'+pts,teams[i].color);renderScoreboard()}
function finishTile(){if(current?.btn){current.btn.classList.add('used');current.btn.disabled=true}closeReveal();checkEnd()}
function closeReveal(){document.getElementById('revealModal').classList.remove('show')}
function showPoints(text,color){const p=document.createElement('div');p.className='points-pop';p.textContent=text;p.style.color=color;p.style.left='50%';p.style.top='42%';document.body.appendChild(p);setTimeout(()=>p.remove(),1300)}
function checkEnd(){const remaining=[...document.querySelectorAll('.tile')].filter(t=>!t.classList.contains('used'));if(remaining.length===0){const sorted=[...teams].sort((a,b)=>b.score-a.score);const medals=['🥇','🥈','🥉','4️⃣'];document.getElementById('rankList').innerHTML=sorted.map((t,i)=>`<div class="rank-item"><span>${medals[i]} ${t.name}</span><span>${t.score}</span></div>`).join('');launchConfetti();setTimeout(()=>document.getElementById('winnerModal').classList.add('show'),600)}}
function launchConfetti(){const palette=[...teams.map(t=>t.color),'#D4AF37','#FDE68A','#fff'];for(let i=0;i<190;i++){const el=document.createElement('div');el.className='confetti';el.style.left=Math.random()*100+'vw';el.style.background=palette[Math.floor(Math.random()*palette.length)];el.style.animationDelay=Math.random()*0.7+'s';document.body.appendChild(el);setTimeout(()=>el.remove(),3500)}}
function launchFire(count=36){for(let i=0;i<count;i++){const f=document.createElement('div');f.className='fire';f.textContent=Math.random()>.35?'🔥':'✨';f.style.left=Math.random()*100+'vw';f.style.animationDelay=Math.random()*0.6+'s';f.style.fontSize=(24+Math.random()*30)+'px';document.body.appendChild(f);setTimeout(()=>f.remove(),3300)}}
function confirmReset(){const btn=document.getElementById('resetBtn');if(!resetArmed){resetArmed=true;btn.textContent='اضغط مرة ثانية للتأكيد';setTimeout(()=>{resetArmed=false;btn.textContent='إعادة اللعبة'},2500);return}resetGame()}
function resetGame(){location.reload()}

function manualScore(teamIndex, amount){
  teams[teamIndex].score += amount;
  if(teams[teamIndex].score < 0) teams[teamIndex].score = 0;
  showPoints((amount>0?'+':'') + amount, teams[teamIndex].color);
  renderScoreboard();
}

function toggleTheme(){document.body.classList.toggle('light')}
function toggleFullscreen(){if(!document.fullscreenElement)document.documentElement.requestFullscreen();else document.exitFullscreen()}
function togglePresentation(){document.body.classList.toggle('presentation')}
</script>
</body>
</html>
